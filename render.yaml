services:
  - type: web
    name: mnist-art-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install .
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: CORS_ALLOW_ORIGINS
        sync: false
      - key: MAX_UPLOAD_BYTES
        value: "20971520"
      - key: JOB_TTL_SECONDS
        value: "3600"
      - key: JOB_WORKERS
        value: "2"
      - key: MNIST_AUTO_DOWNLOAD
        value: "1"
